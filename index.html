<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劍橋 Starter 終極守衛戰 - 全量版</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; overflow: hidden; }
        #game-container { max-width: 850px; margin: 10px auto; background: #34495e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #battle-stage { height: 240px; position: relative; background: linear-gradient(to bottom, #5d9cec, #48cfad); border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 4px solid #2c3e50; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 40px; background: #70a1ff; }
        .fortress { position: absolute; left: 10px; bottom: 20px; font-size: 80px; z-index: 5; }
        .monster { position: absolute; right: 30px; bottom: 20px; font-size: 85px; transition: all 0.3s; z-index: 4; }
        .soldier { position: absolute; left: 85px; bottom: 35px; font-size: 50px; display: none; z-index: 6; transition: transform 0.6s ease-in; }
        .hp-bar-outer { position: absolute; top: 15px; width: 200px; height: 26px; background: #fff; border-radius: 13px; border: 3px solid #2c3e50; overflow: hidden; }
        .hp-inner { height: 100%; width: 100%; transition: width 0.5s; }
        #f-hp-bar { left: 20px; } #m-hp-bar { right: 20px; }
        #spelling-zone { min-height: 60px; margin: 10px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .letter-slot { width: 40px; height: 50px; background: rgba(255,255,255,0.2); border-bottom: 3px solid white; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px; }
        #letter-pool { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .pool-btn { padding: 10px 18px; font-size: 26px; background: #ecf0f1; color: #2c3e50; border-radius: 8px; cursor: pointer; border: none; box-shadow: 0 4px #bdc3c7; font-weight: bold; }
        .pool-btn.used { visibility: hidden; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .btn-opt { padding: 18px; font-size: 22px; cursor: pointer; border: none; border-radius: 12px; background: #f1c40f; color: #2c3e50; font-weight: bold; box-shadow: 0 6px #d35400; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="prog-info" style="color:#bdc3c7; font-size:14px; margin-bottom:5px;">準備就緒，請啟動測驗</div>
    <div id="battle-stage">
        <div class="ground"></div>
        <div id="f-hp-bar" class="hp-bar-outer"><div id="f-fill" class="hp-inner" style="background: #2ecc71;"></div></div>
        <div id="m-hp-bar" class="hp-bar-outer"><div id="m-fill" class="hp-inner" style="background: #e74c3c;"></div></div>
        <div class="fortress">🏰</div><div id="soldier" class="soldier">⚔️</div><div id="monster" class="monster">👾</div>
    </div>

    <div id="quiz-area">
        <div id="mode-title" style="color:#f1c40f; font-weight:bold; font-size:22px; margin-bottom:10px;"></div>
        <div id="question-text" style="font-size: 45px; margin: 10px; min-height: 60px; font-weight:bold;">劍橋單字挑戰</div>
        
        <div id="start-area">
            <button onclick="initGame()" style="padding:15px 50px; font-size:30px; background:#2ecc71; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow: 0 5px #27ae60;">開始測驗 ⚔️</button>
        </div>

        <div id="spelling-ui" style="display:none;">
            <div id="spelling-zone"></div>
            <div id="letter-pool"></div>
        </div>

        <div id="choice-ui" style="display:none;">
            <div class="options-grid" id="options"></div>
        </div>

        <button id="voice-btn" onclick="playVoice()" style="display:none; background:#3498db; color:white; border:none; padding:12px 30px; border-radius:50px; margin: 20px auto; cursor:pointer; font-size:18px;">🔊 重播發音</button>
    </div>
</div>

<div id="msg-screen" class="overlay" style="display:none;">
    <h1 id="msg-title" style="color:#f1c40f; font-size:48px;"></h1>
    <p id="msg-body" style="font-size:24px; margin:20px;"></p>
    <button id="msg-btn" style="padding:15px 50px; font-size:24px; border-radius:10px; cursor:pointer; background:#2ecc71; color:white; border:none;"></button>
</div>

<script>
    // 匯入全量單字庫 (精選自 Unit 1-43)
    const wordDB = [
        {en:'cat', zh:'貓'}, {en:'crocodile', zh:'鱷魚'}, {en:'alphabet', zh:'字母表'}, {en:'twelve', zh:'12'},
        {en:'purple', zh:'紫色'}, {en:'armchair', zh:'扶手椅'}, {en:'keyboard', zh:'鍵盤'}, {en:'helicopter', zh:'直升機'},
        {en:'draw pictures', zh:'畫畫'}, {en:'ride a bike', zh:'騎腳踏車'}, {en:'favourite', zh:'最喜愛的'}, {en:'beautiful', zh:'漂亮的'},
        {en:'spider', zh:'蜘蛛'}, {en:'giraffe', zh:'長頸鹿'}, {en:'polar bear', zh:'北極熊'}, {en:'shoulder', zh:'肩膀'},
        {en:'trousers', zh:'長褲'}, {en:'handbag', zh:'手提包'}, {en:'playground', zh:'操場'}, {en:'bookshop', zh:'書店'},
        {en:'meatballs', zh:'肉丸'}, {en:'sausage', zh:'香腸'}, {en:'badminton', zh:'羽毛球'}, {en:'tablet', zh:'平板'}
    ];

    let currentWord = null;
    let usedIndices = [];
    let fHP = 15;
    let mHP = 20;
    let mode = ""; 
    let guess = [];

    function initGame() {
        document.getElementById('start-area').style.display = 'none';
        document.getElementById('voice-btn').style.display = 'block';
        fHP = 15; mHP = 20; usedIndices = [];
        updateUI();
        nextQuestion();
    }

    function playVoice() {
        if (!currentWord) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentWord.en);
        msg.lang = 'en-GB';
        window.speechSynthesis.speak(msg);
    }

    function nextQuestion() {
        if (usedIndices.length === wordDB.length) {
            showMsg("榮耀勝利！", "你已精通所有單字。", "重頭挑戰", true);
            return;
        }

        let idx;
        do { idx = Math.floor(Math.random() * wordDB.length); } 
        while (usedIndices.includes(idx));
        currentWord = wordDB[idx];

        mode = Math.random() > 0.5 ? "choice" : "spelling";
        renderMode();
        playVoice();
    }

    function renderMode() {
        document.getElementById('prog-info').innerText = `目前進度: ${usedIndices.length} / ${wordDB.length}`;
        
        if (mode === "choice") {
            document.getElementById('mode-title').innerText = "【 模式：聽音選義 】";
            document.getElementById('question-text').innerText = currentWord.en;
            document.getElementById('spelling-ui').style.display = 'none';
            document.getElementById('choice-ui').style.display = 'block';
            renderChoices();
        } else {
            document.getElementById('mode-title').innerText = "【 模式：拼字大師 】";
            document.getElementById('question-text').innerText = currentWord.zh;
            document.getElementById('choice-ui').style.display = 'none';
            document.getElementById('spelling-ui').style.display = 'block';
            renderSpelling();
        }
    }

    function renderChoices() {
        let opts = [currentWord.zh];
        while(opts.length < 4) {
            let r = wordDB[Math.floor(Math.random() * wordDB.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        const container = document.getElementById('options');
        container.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = o;
            b.onclick = () => { if(o === currentWord.zh) combat(2); else hurt(3); };
            container.appendChild(b);
        });
    }

    function renderSpelling() {
        guess = [];
        const pool = document.getElementById('letter-pool');
        const zone = document.getElementById('spelling-zone');
        pool.innerHTML = ''; zone.innerHTML = '';

        const cleanWord = currentWord.en.replace(/\s/g, '').toLowerCase();
        for(let i=0; i<cleanWord.length; i++) {
            let slot = document.createElement('div');
            slot.className = 'letter-slot';
            slot.onclick = () => undo();
            zone.appendChild(slot);
        }

        let chars = cleanWord.split('').sort(() => Math.random() - 0.5);
        chars.forEach((c, i) => {
            let b = document.createElement('button');
            b.className = 'pool-btn';
            b.innerText = c;
            b.id = `l-${i}`;
            b.onclick = () => {
                if(guess.length < cleanWord.length) {
                    b.classList.add('used');
                    guess.push({ char: c, id: `l-${i}` });
                    updateSlots();
                    if(guess.length === cleanWord.length) checkSpelling(cleanWord);
                }
            };
            pool.appendChild(b);
        });
    }

    function updateSlots() {
        const slots = document.querySelectorAll('.letter-slot');
        slots.forEach((s, i) => s.innerText = guess[i] ? guess[i].char : "");
    }

    function undo() {
        if(guess.length === 0) return;
        let last = guess.pop();
        document.getElementById(last.id).classList.remove('used');
        updateSlots();
    }

    function checkSpelling(target) {
        if(guess.map(g => g.char).join('') === target) combat(4);
        else { hurt(3); setTimeout(renderSpelling, 800); }
    }

    function combat(dmg) {
        usedIndices.push(wordDB.indexOf(currentWord));
        mHP -= dmg;
        const s = document.getElementById('soldier');
        s.style.display = 'block';
        s.style.transform = 'translateX(550px)';
        setTimeout(() => {
            s.style.display = 'none'; s.style.transform = 'translateX(0)';
            updateUI();
            if (mHP <= 0) showMsg("怪物擊潰！", "下一隻強敵正在靠近...", "繼續戰鬥", false);
            else nextQuestion();
        }, 600);
    }

    function hurt(dmg) {
        fHP -= dmg;
        const m = document.getElementById('monster');
        m.style.transform = 'translateX(-500px)';
        setTimeout(() => {
            m.style.transform = 'translateX(0)';
            updateUI();
            if (fHP <= 0) showMsg("堡壘失守", "再練習一下，你可以的！", "重新開始", true);
        }, 400);
    }

    function updateUI() {
        document.getElementById('f-fill').style.width = (fHP/15*100) + "%";
        document.getElementById('m-fill').style.width = (mHP/20*100) + "%";
    }

    function showMsg(title, body, btn, reset) {
        document.getElementById('msg-screen').style.display = 'flex';
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-body').innerText = body;
        const b = document.getElementById('msg-btn');
        b.innerText = btn;
        b.onclick = () => {
            if(reset) location.reload();
            else { mHP = 20; updateUI(); document.getElementById('msg-screen').style.display = 'none'; nextQuestion(); }
        };
    }
</script>
</body>
</html>
